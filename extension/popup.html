<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 340px;
  font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #1a1a2e;
  color: #e8eaed;
}

.header {
  padding: 14px 16px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header h1 {
  font-size: 15px;
  font-weight: 700;
  color: #0f7dff;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #555;
  flex-shrink: 0;
}
.status-dot.connected { background: #00c853; }
.status-dot.error { background: #ff3d57; }

.url-box {
  margin: 0 12px;
  padding: 10px 12px;
  background: #0d1b36;
  border: 1px solid #2a3a5e;
  border-radius: 8px;
  font-size: 12px;
  color: #9aa0a6;
  word-break: break-all;
  max-height: 60px;
  overflow: hidden;
}

.settings {
  padding: 10px 12px 6px;
  display: flex;
  gap: 10px;
}
.settings label {
  font-size: 12px;
  color: #9aa0a6;
}
.settings select, .settings input {
  width: 100%;
  margin-top: 3px;
  padding: 5px 8px;
  background: #0d1b36;
  border: 1px solid #2a3a5e;
  border-radius: 6px;
  color: #e8eaed;
  font-size: 12px;
  outline: none;
}
.settings select:focus, .settings input:focus {
  border-color: #0f7dff;
}
.field { flex: 1; }

.actions {
  padding: 8px 12px 14px;
  display: flex;
  gap: 8px;
}
.btn {
  flex: 1;
  padding: 9px 0;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn:active { opacity: 0.7; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-download {
  background: #0f7dff;
  color: white;
}
.btn-extract {
  background: #00c853;
  color: white;
}

.msg {
  padding: 0 12px 10px;
  font-size: 11px;
  color: #9aa0a6;
  min-height: 18px;
}
.msg.error { color: #ff3d57; }
.msg.success { color: #00c853; }
</style>
</head>
<body>

<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>Video Scraper</h1>
</div>

<div class="url-box" id="urlBox">检测中...</div>

<div class="settings">
  <div class="field">
    <label>画质</label>
    <select id="quality">
      <option value="best">best</option>
      <option value="1080p">1080p</option>
      <option value="720p">720p</option>
      <option value="480p">480p</option>
      <option value="worst">worst</option>
    </select>
  </div>
  <div class="field">
    <label>端口</label>
    <input type="number" id="port" value="9527" min="1024" max="65535">
  </div>
</div>

<div class="actions">
  <button class="btn btn-extract" id="btnExtract">提取信息</button>
  <button class="btn btn-download" id="btnDownload">下载视频</button>
</div>

<div class="msg" id="msg"></div>

<script src="popup.js"></script>
</body>
</html>
